name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel an in-progress run
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install export templates
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/4.6.stable ~/.local/share/godot/export_templates/4.6.stable

      # The gdUnit4 editor plugin is for tests only and crashes the headless
      # export on unload. Disable it for this ephemeral CI checkout.
      - name: Disable editor-only addons for headless export
        run: |
          sed -i 's#enabled=PackedStringArray("res://addons/gdUnit4/plugin.cfg")#enabled=PackedStringArray()#' project.godot

      # Pre-build the import cache so the export run doesn't import + export in
      # one pass (more robust). Godot may return non-zero on a clean import.
      - name: Import resources
        run: godot --headless --import || true

      # Godot 4.6 headless tends to crash (signal 11) on shutdown *after* the
      # export pack is written. Tolerate the non-zero exit, then verify the
      # actual web output exists — that, not the exit code, decides success.
      - name: Web export
        run: |
          mkdir -v -p build/web
          godot --headless --verbose --export-release "Web" build/web/index.html || echo "godot exited $? (continuing — verifying output)"
          echo "=== build/web contents ==="
          ls -la build/web || true
          test -f build/web/index.html && test -f build/web/index.wasm && test -f build/web/index.pck

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
