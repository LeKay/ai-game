# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: resource_data_storage
    status: active
    api: "JSON file + FileAccess + JSON.parse()"
    not: Godot .tres/.resource files   # explicitly banned for resource definitions
    adr: docs/architecture/adr-0002-resource-data-registry.md
    reason: "Resources must be editable outside Godot (spreadsheet, config tools). JSON is human-editable, version-control friendly, and schema-versionable."
    referenced_by:
      - docs/architecture/adr-0002-resource-data-registry.md
    added: 2026-05-13
    revised: ""

  - purpose: grid_rendering
    status: active
    api: TileMapLayer (3 nodes: TerrainLayer, ResourceOverlay, BuildingSlots)
    not: TileMap   # explicitly banned — deprecated since Godot 4.3
    adr: docs/architecture/adr-0004-grid-map-data-model.md
    reason: "TileMap is deprecated since Godot 4.3. TileMapLayer provides one node per layer, scene-level tile rotation (4.6), and is the required rendering approach."
    referenced_by:
      - docs/architecture/adr-0004-grid-map-data-model.md
    added: 2026-05-13
    revised: ""

  - purpose: save_file_format
    status: active
    api: "JSON file + FileAccess.store_string() + JSON.parse()"
    not: "Godot .tres (ResourceSaver), binary format"
    adr: docs/architecture/adr-0006-save-load-format-and-serialization-order.md
    reason: "Save files must be human-readable for debugging, version-control friendly for diffs, and editable for testing. JSON provides all three. Binary and .tres are opaque and not debuggable without custom tooling."
    referenced_by:
      - docs/architecture/adr-0006-save-load-format-and-serialization-order.md
    added: 2026-05-13
    revised: ""

  - purpose: autoload_access
    status: active
    api: Engine.get_singleton("Name")
    not: get_node("/root/Name")   # works but less type-safe and less clear
    adr: docs/architecture/adr-0007-player-character-energy-model.md
    reason: "All Foundation systems use Autoload singletons. Engine.get_singleton() is the standard and type-safe access method in Godot 4.x. get_node() works but is more error-prone and less readable."
    referenced_by:
      - docs/architecture/adr-0007-player-character-energy-model.md
    added: 2026-05-13
    revised: ""

