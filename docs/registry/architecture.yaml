# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets:
  - system: tick-system
    status: active
    target_fps: 60
    total_frame_budget_ms: 16.6
    budget_ms: 0.1
    adr: docs/architecture/adr-0001-tick-system.md
    notes: "_process() accumulator + signal emission. At 60fps/1x, ticks fire ~10x/sec. Signal calls: ~100/sec for 10 subscribers. set_process(false) when paused = zero cost."
    referenced_by:
      - docs/architecture/adr-0001-tick-system.md
    added: 2026-05-13
    revised: ""

  - system: resource-registry
    status: active
    target_fps: 60
    total_frame_budget_ms: 16.6
    budget_ms: 0.002
    adr: docs/architecture/adr-0002-resource-data-registry.md
    notes: "One-time startup load (~30 resources). 1-2ms JSON parse + validate. O(1) dictionary lookup at runtime. Zero frame-time impact."
    referenced_by:
      - docs/architecture/adr-0002-resource-data-registry.md
    added: 2026-05-13
    revised: ""

  - system: input-context
    status: active
    target_fps: 60
