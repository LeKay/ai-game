# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: hardcoded_resource_definitions
    status: active
    description: "Systems must not define resource definitions inline in GDScript code. All resource lookups must go through ResourceRegistry.get_definition()."
    why: "Hardcoded definitions are not data-driven, cannot be edited by designers without code changes, have no schema versioning, and create inconsistency when multiple systems define their own resource lists."
    adr: docs/architecture/adr-0002-resource-data-registry.md
    added: 2026-05-13

  - pattern: input_without_context_gate
    status: active
    description: "Systems must not bypass InputContext for player action input. All game-level input must pass through InputContext._unhandled_input() for context gating. Direct calls to Input.is_action_just_pressed() are only valid for UI Control node shortcuts (which consume events before _unhandled_input reaches InputContext)."
    why: "Without context gating, world actions (WASD, interact) would be processed when UI menus are open, causing unintended state mutations. The InputContext stack ensures actions are only processed in the correct context."
    adr: docs/architecture/adr-0003-input-context-system.md
    added: 2026-05-13

  - pattern: tilemap_get_cell_readback
    status: active
    description: "Gameplay code must NEVER call TileMapLayer.get_cell() to determine game state. The GridMap data model is the single source of truth; TileMapLayer is a pure rendering target. If gameplay data doesn't match rendering, it's a rendering bug, not a data bug."
    why: "Readback from renderer creates coupling between game logic and rendering. If renderer state diverges from game data (lag, timing, bugs), gameplay behaves incorrectly. All state must come from the GridMap data arrays."
    adr: docs/architecture/adr-0004-grid-map-data-model.md
    added: 2026-05-13

  - pattern: hardcoded_stack_limits
    status: active
    description: "InventorySystem must never define stack_limit values inline. All stack limits must come from ResourceRegistry.get_definition(id).stack_limit. This ensures balance changes, new resource types, and prototype tuning only require JSON edits, not code changes."
    why: "Hardcoded stack limits in inventory logic duplicate the resource definition source of truth. If the inventory and resource systems disagree on stack_limit, stacking behavior becomes incorrect — items may overflow or underfill slots."
    adr: docs/architecture/adr-0005-inventory-item-state-machine.md
    added: 2026-05-13

  - pattern: circular_serialization
    status: active
    description: "A system's serialize() method must NOT call another system's serialize() method. Each system serializes its own state to a plain Dictionary. WorldSaveManager orchestrates collection and merging — systems do not orchestrate each other."
    why: "Circular serialization creates hidden dependencies between systems that break when save order changes or when a system is added/removed. The orchestrator must be the single coordinator. If System A calls System B's serialize(), then System A becomes tightly coupled to System B's save format."
    adr: docs/architecture/adr-0006-save-load-format-and-serialization-order.md
    added: 2026-05-13

  - pattern: direct_dictionary_access_in_deserialize
    status: active
    description: "Deserializers must use Dictionary.get(key, default) with fallback defaults — NEVER direct access via data[key]. Direct access raises an error on missing keys, which will happen when loading older saves that lack new fields added in later game versions."
    why: "Older save files will not contain keys for systems or fields added in future updates. data[key] access crashes on missing keys. Dictionary.get(key, default) returns the default value instead, enabling graceful schema migration."
    adr: docs/architecture/adr-0006-save-load-format-and-serialization-order.md
    added: 2026-05-13

